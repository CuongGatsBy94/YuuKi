<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <div class="wrapper">
        <h2>Đăng Nhập</h2>
        <form id="login-form" action="process_login.php" method="POST">
            <div class="field email">
                <div class="input-area">
                    <input type="text" name="email" placeholder="Email Address" class="input-form" required>
                    <i class="icon fas fa-envelope"></i>
                </div>
            </div>
            <div class="field password">
                <div class="input-area">
                    <input type="password" name="password" placeholder="Password" class="input-form" required>
                    <i class="icon fas fa-lock"></i>
                </div>
            </div>
            
            <!-- Thêm reCAPTCHA vào form -->
            <div class="g-recaptcha" 
                 data-sitekey="6LdV93gqAAAAAPhsQQ21c5Is3ApQaOVoUDbfSJrp" 
                 data-callback="onSubmit" 
                 data-action="submit"></div>
            
            <input type="submit" value="Login">
        </form>
        <div class="signup-link">Don't have an account? <a href="register.html">Signup Now</a></div>
    </div>

    <script>
        function onSubmit(token) {
            document.getElementById("login-form").submit();
        }
    </script>
</body>
</html>
